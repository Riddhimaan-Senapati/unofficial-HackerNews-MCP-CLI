name: Release

# Publishes to PyPI and creates a GitHub Release whenever a version tag is
# pushed (e.g. `git tag v0.1.0 && git push origin v0.1.0`).
#
# PyPI publishing uses Trusted Publishing (OIDC), so no API token is stored in
# the repo. See RELEASING.md for the one-time PyPI setup. Until that is
# configured, the "Publish to PyPI" step fails; re-run the workflow from
# Actions, Release, Run workflow once it is set up.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
      id-token: write # PyPI Trusted Publishing
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Build sdist and wheel
        run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
