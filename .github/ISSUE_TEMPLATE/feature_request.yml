name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the use case or the gap you ran into.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like the CLI or MCP server to do? A sample command or tool call helps.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, if any.
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      description: This project wraps the read-only HackerNews API.
      options:
        - label: My request stays within read-only HackerNews data (no posting, voting, or authenticated actions).
          required: true
